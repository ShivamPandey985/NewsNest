<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Home — NewsNest</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/variables.css" />
<link rel="stylesheet" href="css/base.css" />
<link rel="stylesheet" href="css/layout.css" />
<link rel="stylesheet" href="css/components.css" />
<link rel="stylesheet" href="css/animations.css" />
<link rel="stylesheet" href="css/themes.css" />
<link rel="stylesheet" href="css/responsive.css" />
<script src="config.js"></script>
</head>
<body>

<div id="navbar-root"></div>

<main class="page-main">
  <section style="padding: 40px 0 8px;">
    <div class="container">
      <h1 id="userGreeting" class="fade-in-up" style="font-size:1.8rem;">Good day 👋</h1>
      <p style="color:var(--text-secondary); margin-top:6px;">Here's what's happening in your world today.</p>
    </div>
  </section>

  <section class="section" style="padding-top:24px;">
    <div class="container">
      <div class="section-header">
        <h2 class="section-title">🔥 Trending Now</h2>
        <a href="category.html" class="btn btn-ghost">View all →</a>
      </div>
      <div class="grid-articles" id="trendingGrid">
        <!-- populated by home.js -->
      </div>
    </div>
  </section>

  <section class="section" style="padding-top:0;">
    <div class="container">
      <div class="section-header">
        <h2 class="section-title">⭐ For You</h2>
        <a href="settings.html" class="btn btn-ghost">Edit interests</a>
      </div>
      <div class="grid-articles" id="forYouGrid">
        <!-- populated by home.js -->
      </div>
    </div>
  </section>

  <section class="section" style="padding-top:0;">
    <div class="container">
      <div class="section-header">
        <h2 class="section-title">🆕 Latest</h2>
        <a href="search.html" class="btn btn-ghost">Search more →</a>
      </div>
      <div class="grid-articles" id="latestGrid">
        <!-- populated by home.js -->
      </div>
    </div>
  </section>
</main>

<div id="footer-root"></div>

<script src="js/storage.js"></script>
<script src="js/api.js"></script>
<script src="js/theme.js"></script>
<script src="js/toast.js"></script>
<script src="js/offline.js"></script>
<script src="js/skeleton.js"></script>
<script src="js/state.js"></script>
<script src="js/router.js"></script>
<script src="js/components/navbar.js"></script>
<script src="js/components/footer.js"></script>
<script src="js/components/articleCard.js"></script>
<script src="js/pages/home.js"></script>
</body>
</html>
