<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>404 — Page Not Found | NewsNest</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/variables.css" />
<link rel="stylesheet" href="css/base.css" />

      <p style="color:var(--text-secondary); margin-bottom:28px;">The page you're looking for was moved, deleted, or never existed.</p>
      <a href="index.html" class="btn btn-primary">Back to NewsNest</a>

  <script>document.addEventListener('DOMContentLoaded', () => ThemeManager.init());</script>
