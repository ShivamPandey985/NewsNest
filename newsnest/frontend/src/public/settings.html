<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Settings — NewsNest</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/variables.css" />
<link rel="stylesheet" href="css/base.css" />
<link rel="stylesheet" href="css/layout.css" />
<link rel="stylesheet" href="css/components.css" />
<link rel="stylesheet" href="css/animations.css" />
<link rel="stylesheet" href="css/themes.css" />
<link rel="stylesheet" href="css/responsive.css" />
<script src="config.js"></script>
</head>
<body>

<div id="navbar-root"></div>

<main class="page-main">
  <section class="section">
    <div class="container" style="max-width:720px;">
      <h1 class="fade-in-up" style="font-size:1.8rem; margin-bottom:28px;">⚙️ Settings</h1>

      <div class="glass-card" style="padding:28px; margin-bottom:24px;">
        <div class="form-group">
          <label for="settingsNameInput">Your Name</label>
          <input type="text" id="settingsNameInput" placeholder="Your name" />
        </div>

        <div style="display:flex; align-items:center; justify-content:space-between; padding:12px 0;">
          <div>
            <div style="font-weight:600;">Dark Mode</div>
            <div style="color:var(--text-muted); font-size:0.85rem;">Switch between light and dark themes</div>
          </div>
          <div class="toggle-switch" id="settingsThemeSwitch"></div>
        </div>
      </div>

      <div class="glass-card" style="padding:28px; margin-bottom:24px;">
        <h3 style="margin-bottom:16px;">Your Interests</h3>
        <div id="settingsInterestPicker" style="max-height:340px; overflow-y:auto;"></div>
      </div>

      <div style="display:flex; gap:14px; flex-wrap:wrap;">
        <button class="btn btn-primary" id="settingsSaveBtn">Save Changes</button>
        <button class="btn btn-outline" id="settingsResetBtn" style="color:var(--danger); border-color:var(--danger);">Reset All Data</button>
      </div>
    </div>
  </section>
</main>

<div id="footer-root"></div>

<script src="js/storage.js"></script>
<script src="js/api.js"></script>
<script src="js/theme.js"></script>
<script src="js/toast.js"></script>
<script src="js/offline.js"></script>
<script src="js/skeleton.js"></script>
<script src="js/state.js"></script>
<script src="js/router.js"></script>
<script src="js/components/navbar.js"></script>
<script src="js/components/footer.js"></script>
<script src="js/components/interestPicker.js"></script>
<script src="js/pages/settings.js"></script>
</body>
</html>
