version: "3.9"

services:
  category-service:
    build:
      context: ./category-service
      dockerfile: Dockerfile
    container_name: newsnest-category-service
    restart: unless-stopped
    environment:
      PORT: 4002
      NODE_ENV: production
      ALLOWED_ORIGINS: http://api-gateway:4000
    networks:
      - newsnest-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4002/health', r => process.exit(r.statusCode===200?0:1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  news-service:
    build:
      context: ./news-service
      dockerfile: Dockerfile
    container_name: newsnest-news-service
    restart: unless-stopped
    environment:
      PORT: 4001
      NODE_ENV: production
      ALLOWED_ORIGINS: http://api-gateway:4000
      NEWS_API_KEY: ${NEWS_API_KEY}
      NEWS_API_BASE_URL: https://newsapi.org/v2
      CATEGORY_SERVICE_URL: http://category-service:4002
      CACHE_TTL_MS: 300000
    depends_on:
      category-service:
        condition: service_healthy
    networks:
      - newsnest-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4001/health', r => process.exit(r.statusCode===200?0:1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: newsnest-api-gateway
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      NODE_ENV: production
      ALLOWED_ORIGINS: http://localhost:8080,http://frontend:8080
      NEWS_SERVICE_URL: http://news-service:4001
      CATEGORY_SERVICE_URL: http://category-service:4002
      API_VERSION: v1
    depends_on:
      news-service:
        condition: service_healthy
      category-service:
        condition: service_healthy
    networks:
      - newsnest-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health', r => process.exit(r.statusCode===200?0:1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: newsnest-frontend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      API_GATEWAY_URL: http://localhost:4000
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - newsnest-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health', r => process.exit(r.statusCode===200?0:1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  newsnest-network:
    driver: bridge
