apiVersion: v1
kind: Secret
metadata:
  name: newsnest-secrets
  labels:
    app: newsnest
type: Opaque
stringData:
  # Replace with your actual NewsAPI.org key before applying,
  # or create this secret imperatively instead of committing real values:
  # kubectl create secret generic newsnest-secrets --from-literal=NEWS_API_KEY=your_key_here
  NEWS_API_KEY: "your_newsapi_org_key_here"
