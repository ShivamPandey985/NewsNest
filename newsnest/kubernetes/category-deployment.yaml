apiVersion: apps/v1
kind: Deployment
metadata:
  name: category-service
  labels:
    app: newsnest
    component: category-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: newsnest
      component: category-service
  template:
    metadata:
      labels:
        app: newsnest
        component: category-service
    spec:
      containers:
        - name: category-service
          image: YOUR_DOCKERHUB_USERNAME/newsnest-category-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4002
          env:
            - name: PORT
              value: "4002"
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: newsnest-config
                  key: NODE_ENV
            - name: ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: newsnest-config
                  key: ALLOWED_ORIGINS_GATEWAY
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 4002
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4002
            initialDelaySeconds: 10
            periodSeconds: 20
