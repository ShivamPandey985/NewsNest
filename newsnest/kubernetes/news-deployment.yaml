apiVersion: apps/v1
kind: Deployment
metadata:
  name: news-service
  labels:
    app: newsnest
    component: news-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: newsnest
      component: news-service
  template:
    metadata:
      labels:
        app: newsnest
        component: news-service
    spec:
      containers:
        - name: news-service
          image: shivam985/newsnest-news-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4001
          env:
            - name: PORT
              value: "4001"
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: newsnest-config
                  key: NODE_ENV
            - name: ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: newsnest-config
                  key: ALLOWED_ORIGINS_GATEWAY
            - name: NEWS_API_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: newsnest-config
                  key: NEWS_API_BASE_URL
            - name: CATEGORY_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: newsnest-config
                  key: CATEGORY_SERVICE_URL
            - name: CACHE_TTL_MS
              valueFrom:
                configMapKeyRef:
                  name: newsnest-config
                  key: CACHE_TTL_MS
            - name: NEWS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: newsnest-secrets
                  key: NEWS_API_KEY
          resources:
            requests:
              cpu: "100m"
              memory: "96Mi"
            limits:
              cpu: "300m"
              memory: "192Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 4001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4001
            initialDelaySeconds: 10
            periodSeconds: 20
